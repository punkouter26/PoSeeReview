name: Build and Deploy to Azure App Service

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  APP_NAME: app-poseereview
  RESOURCE_GROUP: PoSeeReview
  DOTNET_VERSION: '10.0.x'

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore

    - name: Run unit tests
      run: |
        dotnet test tests/Po.SeeReview.UnitTests/Po.SeeReview.UnitTests.csproj \
          --no-restore \
          --configuration Release \
          --logger "console;verbosity=minimal" \
          --results-directory ./test-results
      continue-on-error: false

    - name: Publish API (includes Blazor WASM client)
      run: |
        dotnet publish src/Po.SeeReview.Api/Po.SeeReview.Api.csproj \
          -c Release \
          -o ./publish \
          --no-restore

    - name: Compute version
      id: version
      run: |
        COMMIT_COUNT=$(git rev-list --count HEAD)
        SHORT_SHA=$(git rev-parse --short HEAD)
        echo "version=1.0.${COMMIT_COUNT}-${SHORT_SHA}" >> $GITHUB_OUTPUT
        echo "Version: 1.0.${COMMIT_COUNT}-${SHORT_SHA}"

    - name: Azure Login (OIDC)
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    # Set startup timeout BEFORE deploy so the new container has enough warmup time.
    # Root cause: Linux cert update (~5 min) + Managed Identity cold start (~2 min) = ~10 min total.
    - name: Configure App Service startup timeout
      run: |
        az webapp config appsettings set \
          --name ${{ env.APP_NAME }} \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --settings WEBSITES_CONTAINER_START_TIME_LIMIT=900

    # Use az webapp deploy --async true instead of azure/webapps-deploy@v3.
    # The v3 action waits for OneDeploy to complete AND for the new container to become
    # healthy — a 10+ min wait that hits Kudu's 10-min SCM timeout, causing 504 failures.
    # --async true uploads the zip and returns immediately; Azure handles the container
    # lifecycle in the background. The app is already confirmed healthy after startup.
    - name: Deploy to App Service
      run: |
        zip -r publish.zip ./publish
        az webapp deploy \
          --name ${{ env.APP_NAME }} \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --src-path publish.zip \
          --type zip \
          --async true




