name: Build and Deploy to Azure App Service

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  APP_NAME: app-poseereview
  RESOURCE_GROUP: PoSeeReview
  DOTNET_VERSION: '10.0.x'
  HEALTH_URL: https://app-poseereview.azurewebsites.net/api/health/live

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore

    - name: Run unit tests
      run: |
        dotnet test tests/Po.SeeReview.UnitTests/Po.SeeReview.UnitTests.csproj \
          --no-restore \
          --configuration Release \
          --logger "console;verbosity=minimal" \
          --results-directory ./test-results
      continue-on-error: false

    - name: Publish API (includes Blazor WASM client)
      run: |
        dotnet publish src/Po.SeeReview.Api/Po.SeeReview.Api.csproj \
          -c Release \
          -o ./publish \
          --no-restore

    - name: Compute version
      id: version
      run: |
        COMMIT_COUNT=$(git rev-list --count HEAD)
        SHORT_SHA=$(git rev-parse --short HEAD)
        echo "version=1.0.${COMMIT_COUNT}-${SHORT_SHA}" >> $GITHUB_OUTPUT
        echo "Version: 1.0.${COMMIT_COUNT}-${SHORT_SHA}"

    - name: Azure Login (OIDC)
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Deploy to App Service
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.APP_NAME }}
        package: ./publish

    - name: Health check (liveness)
      run: |
        echo "Waiting 30s for app to warm up..."
        sleep 30
        for i in {1..5}; do
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.HEALTH_URL }}")
          echo "Attempt $i: HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Health check passed!"
            exit 0
          fi
          sleep 15
        done
        echo "Health check failed after 5 attempts"
        exit 1


