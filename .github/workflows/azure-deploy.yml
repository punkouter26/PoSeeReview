name: Build and Deploy to Azure App Service

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  APP_NAME: app-poseereview
  RESOURCE_GROUP: PoSeeReview
  DOTNET_VERSION: '10.0.x'

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore

    - name: Run unit tests
      run: |
        dotnet test tests/Po.SeeReview.UnitTests/Po.SeeReview.UnitTests.csproj \
          --no-restore \
          --configuration Release \
          --logger "console;verbosity=minimal" \
          --results-directory ./test-results
      continue-on-error: false

    - name: Publish API (includes Blazor WASM client)
      run: |
        dotnet publish src/Po.SeeReview.Api/Po.SeeReview.Api.csproj \
          -c Release \
          -o ./publish \
          --no-restore

    - name: Compute version
      id: version
      run: |
        COMMIT_COUNT=$(git rev-list --count HEAD)
        SHORT_SHA=$(git rev-parse --short HEAD)
        echo "version=1.0.${COMMIT_COUNT}-${SHORT_SHA}" >> $GITHUB_OUTPUT
        echo "Version: 1.0.${COMMIT_COUNT}-${SHORT_SHA}"

    - name: Azure Login (OIDC)
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    # Set startup timeout BEFORE deploy so the new container has enough warmup time.
    # Root cause: Linux cert update (~5 min) + Managed Identity cold start (~2 min) = ~10 min total.
    - name: Configure App Service startup timeout
      run: |
        az webapp config appsettings set \
          --name ${{ env.APP_NAME }} \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --settings WEBSITES_CONTAINER_START_TIME_LIMIT=900

    # Pre-warm Kudu SCM before deploying.
    # The az webapp deploy command's internal warmup frequently 504s on cold-start instances.
    # Polling the SCM root ourselves first ensures Kudu is actually responsive before we upload.
    # 401/403 = Kudu is up (auth wall). 302 = also up (redirect to auth). Only 5xx/000 = not ready.
    - name: Wait for Kudu SCM to be responsive
      run: |
        echo "Polling https://${{ env.APP_NAME }}.scm.azurewebsites.net until Kudu is ready..."
        for i in $(seq 1 24); do
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 \
            "https://${{ env.APP_NAME }}.scm.azurewebsites.net/" 2>/dev/null || echo "000")
          echo "Poll $i/24: SCM returned HTTP $STATUS"
          if [ "$STATUS" != "000" ] && \
             [ "$STATUS" != "502" ] && \
             [ "$STATUS" != "503" ] && \
             [ "$STATUS" != "504" ]; then
            echo "Kudu SCM is responsive (HTTP $STATUS) — proceeding to deploy"
            exit 0
          fi
          echo "Kudu not ready yet, waiting 30s..."
          sleep 30
        done
        echo "Kudu SCM never became responsive after 12 minutes — attempting deploy anyway"

    # Deploy using Kudu REST API directly via curl instead of az webapp deploy.
    # az webapp deploy (Python-based) hangs indefinitely because despite --async true
    # the CLI internally polls for deployment completion with no effective timeout.
    # We call the Kudu /api/zipdeploy endpoint with curl --max-time 300 so we have
    # a hard wall-clock limit that is always enforced regardless of server behaviour.
    # isAsync=true tells Kudu to accept the upload and return 202 immediately without
    # waiting for the full container restart (which would timeout anyway).
    # Auth: site-level publishing credentials via HTTP Basic auth (SCM basic auth enabled).
    - name: Deploy to App Service
      run: |
        zip -qr publish.zip ./publish

        # Fetch site-level publishing credentials via ARM API.
        CREDS_JSON=$(az webapp deployment list-publishing-credentials \
          --name ${{ env.APP_NAME }} \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --query "{user:publishingUserName, pass:publishingPassword}" \
          -o json)
        KUDU_USER=$(echo "$CREDS_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['user'])")
        KUDU_PASS=$(echo "$CREDS_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['pass'])")

        KUDU_URL="https://${{ env.APP_NAME }}.scm.azurewebsites.net/api/zipdeploy?isAsync=true"

        DEPLOY_SUBMITTED=false
        for attempt in 1 2 3; do
          echo "Deployment attempt $attempt of 3 via Kudu REST API..."

          set +e
          curl -sS \
            --max-time 300 \
            -o /tmp/deploy_response.txt \
            -w "%{http_code}" \
            -X POST "$KUDU_URL" \
            -u "$KUDU_USER:$KUDU_PASS" \
            -H "Content-Type: application/zip" \
            --data-binary @publish.zip \
            > /tmp/deploy_status.txt 2>/tmp/deploy_error.txt
          CURL_EXIT=$?
          set -e

          HTTP_STATUS=$(cat /tmp/deploy_status.txt 2>/dev/null || echo "000")
          echo "HTTP status: $HTTP_STATUS (curl exit: $CURL_EXIT)"
          cat /tmp/deploy_response.txt 2>/dev/null || true
          if [ -s /tmp/deploy_error.txt ]; then
            echo "curl stderr: $(cat /tmp/deploy_error.txt)"
          fi

          # 200 = sync success, 202 = accepted/async (isAsync=true), both mean submitted
          if [ "$HTTP_STATUS" = "202" ] || [ "$HTTP_STATUS" = "200" ]; then
            echo "Deployment submitted successfully (HTTP $HTTP_STATUS) on attempt $attempt"
            DEPLOY_SUBMITTED=true
            break
          fi

          if [ "$CURL_EXIT" = "28" ]; then
            echo "WARNING: curl timed out (5 min) on attempt $attempt"
          elif [ -z "$HTTP_STATUS" ] || [ "$HTTP_STATUS" = "000" ]; then
            echo "WARNING: connection failed on attempt $attempt"
          else
            echo "WARNING: Deploy returned HTTP $HTTP_STATUS on attempt $attempt"
          fi

          if [ $attempt -lt 3 ]; then
            WAIT=$((attempt * 60))
            echo "Waiting ${WAIT}s before retry (attempt $((attempt+1)))..."
            sleep $WAIT
          fi
        done

        if [ "$DEPLOY_SUBMITTED" != "true" ]; then
          echo "All 3 deployment attempts failed to submit"
          exit 1
        fi

    - name: Verify deployment health
      run: |
        BASE_URL="https://${{ env.APP_NAME }}.azurewebsites.net"

        echo "Waiting 60s for new container to start..."
        sleep 60

        for i in $(seq 1 20); do
          LIVE_STATUS=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 20 \
            "$BASE_URL/api/health/live" || echo "000")
          READY_STATUS=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 20 \
            "$BASE_URL/api/health" || echo "000")

          echo "Attempt $i: /api/health/live=$LIVE_STATUS, /api/health=$READY_STATUS"

          if [ "$LIVE_STATUS" = "200" ] && [ "$READY_STATUS" = "200" ]; then
            echo "App is healthy after deployment"
            exit 0
          fi

          sleep 30
        done

        echo "WARNING: App did not return healthy status from /api/health/live and /api/health within 10 minutes"
        echo "Last health response body from /api/health (best effort):"
        curl -sS --max-time 20 "$BASE_URL/api/health" || true
        exit 1




